name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  pre_commit_checks:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@main

      - uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup uv python environment
        run: uv venv

      - name: uv lock check
        run: uv lock --locked --offline

      - name: uv sync
        run: uv sync --all-groups --all-extras

      - uses: pre-commit/action@main

  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.django-version }})
    runs-on: ubuntu-latest
    needs: pre_commit_checks
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.11', '3.12', '3.13']
        django-version:
          - 'dj32'
          - 'dj42'
          - 'dj52'
          - 'dj60'
        exclude:
          # dj42 only on 3.11 (trailing edge)
          - python-version: '3.12'
            django-version: 'dj42'
          - python-version: '3.13'
            django-version: 'dj42'
          # dj52 only on 3.12 (middle)
          - python-version: '3.11'
            django-version: 'dj52'
          - python-version: '3.13'
            django-version: 'dj52'
          # dj60 only on 3.13 (bleeding edge)
          - python-version: '3.11'
            django-version: 'dj60'
          - python-version: '3.12'
            django-version: 'dj60'

    env:
      TEST_PYTHON_VERSION: ${{ matrix.python-version }}
      TEST_DJANGO_VERSION: ${{ matrix.django-version }}

    steps:
      - uses: actions/checkout@main

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package and test deps
        run: |
          uv sync --all-groups --all-extras

      - name: Install Django ${{ matrix.django-version }}
        run: |
          case "${{ matrix.django-version }}" in
            dj32) uv pip install "django~=3.2" ;;
            dj42) uv pip install "django~=4.2" ;;
            dj52) uv pip install "django~=5.2" ;;
            dj60) uv pip install "django~=6.0" ;;
          esac

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
